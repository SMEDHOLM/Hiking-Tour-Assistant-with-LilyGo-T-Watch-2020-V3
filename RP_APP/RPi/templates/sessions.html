<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hike Sessions</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-image: url('/images/forest.jpg');
            background-size: cover;
            background-position: center top;
            margin: 0;
            padding: 0;
        }

        .content {
            max-width: 600px;
            margin: 20px auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
            background-color: rgba(255, 255, 255, 0.9);
            overflow-y: auto;
            max-height: 80vh;
        }

        h1 {
            text-align: center;
            color: #333;
        }

        ul {
            list-style-type: none;
            padding: 0;
            margin: 0;
        }

        li {
            background-color: #fff;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .session-info {
            flex: 1;
        }

        .session-buttons {
            display: flex;
            align-items: center;
        }

        .session-buttons form {
            margin-right: 10px;
        }

        .view-button {
            background-color: #007bff;
            color: #fff;
        }

        .delete-button {
            background-color: #dc3545; /* Red color for delete button */
            color: #fff;
        }

        button {
            border: none;
            border-radius: 3px;
            padding: 10px 20px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        button:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="content">
        <h1>Hike Sessions</h1>
        <ul>
            {% for session in sessions %}
                <li data-session-id="{{ session.id }}">
                    <div class="session-info">
                        <strong>Session ID:</strong> {{ session.id }}
                    </div>
                    <div class="session-buttons">
                        <form action="/sessions/{{ session.id }}" method="get">
                            <button class="view-button" type="submit">View</button>
                        </form>
                        <button class="delete-button" onclick="deleteSession('{{ session.id }}')">Delete</button>
                    </div>
                </li>
            {% endfor %}
        </ul>
    </div>

    <script>
        function deleteSession(sessionId) {
            if (confirm("Are you sure you want to delete this session?")) {
                fetch(`/sessions/${sessionId}/delete`, {
                    method: 'GET'
                }).then(() => {
                    // Reload the page after successful deletion
                    location.reload();
                }).catch(error => {
                    console.error('Error deleting session:', error);
                });
            }
        }
    </script>
</body>
</html>
